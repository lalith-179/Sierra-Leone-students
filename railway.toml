[build]
builder = "nixpacks"

[deploy]
startCommand = "cd back-end && NODE_ENV=production npm start"
healthcheckPath = "/api/members"
healthcheckTimeout = 100
restartPolicy = "on-failure"
maxRetries = 10

[env]
NODE_ENV = "production"
PORT = "5000"

[nixpacks]
node_version = "18.x"
install_cmd = "cd back-end && npm install && cd ../front-end && npm install"
build_cmd = "cd front-end && npm run build && cd ../back-end && rm -rf dist && cp -r ../front-end/dist ."