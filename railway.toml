[build]
builder = "nixpacks"
# Setup Node.js environment before running build commands
buildCommand = "curl -fsSL https://deb.nodesource.com/setup_18.x | bash - && apt-get install -y nodejs && cd back-end && npm install && cd ../front-end && npm install && npm run build && cd ../back-end && cp -r ../front-end/dist ."

[deploy]
startCommand = "cd back-end && NODE_ENV=production npm start"
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicy = "on-failure"
maxRetries = 10

[env]
NODE_ENV = "production"
PORT = "5000"

# Specify Node.js version
[nixpacks]
node_version = "18.x"