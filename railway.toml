[build]
builder = "nixpacks"

[phases.setup]
nixPkgs = ["nodejs", "nodejs.npm"]

[phases.install]
cmds = [
    "cd back-end && npm install",
    "cd ../front-end && npm install"
]

[phases.build]
cmds = [
    "cd front-end && npm run build",
    "cd ../back-end && rm -rf dist",
    "cd ../back-end && cp -r ../front-end/dist ."
]

[deploy]
startCommand = "cd back-end && NODE_ENV=production npm start"
healthcheckPath = "/api/members"
healthcheckTimeout = 100
restartPolicy = "on-failure"
maxRetries = 10

[env]
NODE_ENV = "production"
PORT = "5000"

[nixpacks]
node_version = "18.x"